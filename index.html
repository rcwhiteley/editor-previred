<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Previred – Formato Largo Variable por Separador</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; font-size: 13px; }

  header {
    background: linear-gradient(90deg, #5C6BC0, #3949AB);
    color: #fff;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 12px; opacity: .8; }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    flex-wrap: wrap;
  }
  .toolbar label {
    background: #5C6BC0; color: #fff;
    padding: 6px 14px; border-radius: 4px;
    cursor: pointer; font-size: 13px;
    transition: background .2s;
  }
  .toolbar label:hover { background: #3949AB; }
  #fileInput { display: none; }
  .toolbar .info { font-size: 12px; color: #666; }
  #rowCount { font-weight: 600; color: #5C6BC0; }

  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-wrap input {
    padding: 6px 30px 6px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 13px; width: 240px; outline: none;
  }
  .search-wrap input:focus { border-color: #5C6BC0; box-shadow: 0 0 0 2px #c5cae9; }
  .search-wrap .clear-btn {
    position: absolute; right: 6px; background: none; border: none;
    cursor: pointer; font-size: 15px; color: #999; line-height: 1;
    display: none;
  }
  .search-wrap .clear-btn.visible { display: block; }
  .search-info { font-size: 12px; color: #e65100; font-weight: 600; }
  .modified-info { font-size: 12px; color: #1565c0; font-weight: 600; }
  td.modified { box-shadow: inset 3px 0 0 #f57c00; background: #fff8e1 !important; }
  td.modified input, td.modified select { background: transparent; }

  .btn {
    padding: 6px 14px; border-radius: 4px; border: none;
    cursor: pointer; font-size: 13px; transition: background .2s;
  }
  .btn-export { background: #1976d2; color: #fff; }
  .btn-export:hover { background: #1565c0; }

  .table-wrap {
    overflow: auto;
    height: calc(100vh - 106px);
    padding: 0;
    position: relative;
  }
  .vscroll-spacer { pointer-events: none; }
  .vscroll-table-wrap { position: sticky; top: 0; }

  table {
    border-collapse: collapse;
    table-layout: fixed;
    background: #fff;
  }
  thead th {
    position: sticky; top: 0; z-index: 10;
    background: #4a148c; color: #fff;
    padding: 6px 4px;
    text-align: center;
    border: 1px solid #6a1b9a;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    min-width: 90px;
  }
  thead th .col-num { display: block; font-size: 10px; opacity: .75; }
  thead th .col-name { display: block; font-size: 11px; }
  thead tr.section-row th {
    background: #311b92; font-size: 11px; padding: 3px 6px;
    text-align: left; letter-spacing: .5px;
  }

  tbody tr:nth-child(even) { background: #f9f6fd; }
  tbody tr:hover { background: #ede7f6; }

  td {
    border: 1px solid #e0e0e0;
    padding: 2px 3px;
    vertical-align: middle;
    min-width: 90px;
  }
  td input[type="text"], td input[type="number"] {
    width: 100%; border: none; background: transparent;
    padding: 2px 3px; font-size: 12px; color: #222;
    outline: none;
  }
  td input[type="text"]:focus, td input[type="number"]:focus {
    background: #fff9c4; border-radius: 2px;
  }
  td select {
    width: 100%; border: none; background: transparent;
    font-size: 12px; color: #222; outline: none; cursor: pointer;
    padding: 2px 2px;
  }
  td select:focus { background: #fff9c4; }

  .row-num {
    background: #ede7f6; color: #555; font-size: 11px;
    text-align: center; min-width: 36px; width: 36px;
    font-weight: 600; position: sticky; left: 0; z-index: 5;
  }

  .empty-state {
    text-align: center; padding: 60px 20px; color: #9e9e9e;
  }
  .empty-state svg { width: 64px; height: 64px; opacity: .3; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }
</style>
</head>

<header>

const SECTION_COLORS = [
  '#5C6BC0','#26A69A','#EF5350','#AB47BC','#42A5F5','#66BB6A',
  '#FFA726','#EC407A','#8D6E63','#78909C','#D4E157','#29B6F6'
];

function textColorFor(bg) {
  const hex = bg.replace('#','');
  const r = parseInt(hex.substring(0,2),16);
  const g = parseInt(hex.substring(2,4),16);
  const b = parseInt(hex.substring(4,6),16);
  const lum = (0.299*r + 0.587*g + 0.114*b);
  return lum > 160 ? '#222' : '#fff';
}

const NUM_COLS = 105;
const ROW_H = 28;
const OVERSCAN = 10;

// ─── STATE ──────────────────────────────────────────────────────────────────
let rows = [];          // display values (unquoted) — array of 105-string arrays
let rawRows = [];       // original raw tokens per field — array of 105-string arrays
let origRows = [];      // original display values (for revert detection)
let origRawRows = [];   // original raw tokens (for restoring on revert)
let modifiedCells = new Set(); // 'ri:fi' keys of edited cells
let filteredIdx = [];   // indices into rows[] currently visible
let theadEl = null;
let tbodyEl = null;
let tableEl = null;
let renderedStart = -1;
let renderedEnd = -1;
let theadHeight = 0;
let searchTerm = '';
let originalLineEnding = '\r\n'; // detected from source file


// ─── FILTER ─────────────────────────────────────────────────────────────────
function applyFilter() {
  const term = searchTerm.trim().toLowerCase();
  if (!term) {
    filteredIdx = rows.map((_, i) => i);
  } else {
    filteredIdx = [];
    rows.forEach((row, i) => {
      if (row.some(v => v.toLowerCase().includes(term))) filteredIdx.push(i);
    });
  }
  const info = document.getElementById('searchInfo');
  if (term) {
    info.style.display = '';
    info.textContent = `${filteredIdx.length} resultado${filteredIdx.length !== 1 ? 's' : ''} de ${rows.length}`;
  } else {
    info.style.display = 'none';
  }
  document.getElementById('rowCount').textContent = rows.length;
  renderedStart = -1; renderedEnd = -1;
  if (tbodyEl) { tbodyEl.innerHTML = ''; onScroll(); }
}

// ─── BUILD STATIC HEADER ────────────────────────────────────────────────────
function buildTable() {
  const wrap = document.getElementById('tableWrap');
  wrap.removeEventListener('scroll', onScroll);
  wrap.innerHTML = '';
  renderedStart = -1; renderedEnd = -1;
  theadEl = null; tbodyEl = null; tableEl = null; theadHeight = 0;

  if (rows.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Abre un archivo CSV para comenzar.</p></div>`;
    document.getElementById('rowCount').textContent = 0;
    return;
  }

  tableEl = document.createElement('table');
  theadEl = document.createElement('thead');

  // Row 1: section groups
  const secRow = document.createElement('tr');
  const thSpacer = document.createElement('th');
  thSpacer.rowSpan = 2;
  thSpacer.style.cssText = 'min-width:36px;width:36px;background:#ede7f6;border:none;position:sticky;left:0;z-index:20;';
  secRow.appendChild(thSpacer);

  // build section map: for each field index, store its section color
  const fieldSectionColor = [];
  let secIdx = -1;
  let i = 0;
  while (i < FIELDS.length) {
    if (FIELDS[i].s) {
      secIdx++;
      let count = 1;
      while (i + count < FIELDS.length && !FIELDS[i+count].s) count++;
      const color = SECTION_COLORS[secIdx % SECTION_COLORS.length];
      for (let j = 0; j < count; j++) fieldSectionColor[i + j] = color;
      const th = document.createElement('th');
      th.colSpan = count;
      th.style.cssText = `background:${color};color:${textColorFor(color)};text-align:left;font-size:11px;padding:3px 6px;letter-spacing:.5px;`;
      th.textContent = FIELDS[i].s;
      secRow.appendChild(th);
      i += count;
    } else { i++; }
  }
  theadEl.appendChild(secRow);

  // Row 2: field names
  const nameRow = document.createElement('tr');
  FIELDS.forEach((f, fi) => {
    const th = document.createElement('th');
    th.innerHTML = `<span class="col-num">#${f.i}</span><span class="col-name">${f.name}</span>`;
    th.title = f.name;
    const c = fieldSectionColor[fi] || '#4a148c';
    th.style.background = c;
    th.style.color = textColorFor(c);
    nameRow.appendChild(th);
  });
  theadEl.appendChild(nameRow);
  tableEl.appendChild(theadEl);

  tbodyEl = document.createElement('tbody');
  tableEl.appendChild(tbodyEl);
  wrap.appendChild(tableEl);

  // measure thead height after paint
  requestAnimationFrame(() => {
    theadHeight = theadEl.getBoundingClientRect().height;
    onScroll();
  });

  wrap.addEventListener('scroll', onScroll);
  document.getElementById('rowCount').textContent = rows.length;

  applyFilter();
}

// ─── VIRTUAL SCROLL ─────────────────────────────────────────────────────────
function onScroll() {
  const wrap = document.getElementById('tableWrap');
  if (!wrap || !tbodyEl) return;

  const scrollTop = wrap.scrollTop;
  const viewH = wrap.clientHeight;
  const totalFiltered = filteredIdx.length;

  const firstVis = Math.max(0, Math.floor((scrollTop - theadHeight) / ROW_H) - OVERSCAN);
  const lastVis  = Math.min(totalFiltered - 1, Math.ceil((scrollTop - theadHeight + viewH) / ROW_H) + OVERSCAN);

  if (firstVis === renderedStart && lastVis === renderedEnd) return;
  renderedStart = firstVis;
  renderedEnd   = lastVis;

  tbodyEl.innerHTML = '';

  // top spacer
  if (firstVis > 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = FIELDS.length + 1;
    td.style.height = (firstVis * ROW_H) + 'px';
    td.style.padding = '0'; td.style.border = 'none';
    tr.appendChild(td);
    tbodyEl.appendChild(tr);
  }

  for (let vi = firstVis; vi <= lastVis; vi++) {
    tbodyEl.appendChild(buildRow(vi));
  }

  // bottom spacer
  const remaining = totalFiltered - 1 - lastVis;
  if (remaining > 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = FIELDS.length + 1;
    td.style.height = (remaining * ROW_H) + 'px';
    td.style.padding = '0'; td.style.border = 'none';
    tr.appendChild(td);
    tbodyEl.appendChild(tr);
  }
}

// vi = index into filteredIdx; ri = actual row index in rows[]
function buildRow(vi) {
  const ri = filteredIdx[vi];
  const row = rows[ri];
  const tr = document.createElement('tr');
  tr.style.height = ROW_H + 'px';

  const tdNum = document.createElement('td');
  tdNum.className = 'row-num';
  tdNum.textContent = ri + 1;  // always shows original row number
  tr.appendChild(tdNum);

  FIELDS.forEach((f, fi) => {
    const td = document.createElement('td');
    const val = row[fi] || '';
    if (modifiedCells.has(`${ri}:${fi}`)) td.classList.add('modified');
    if (f.tabla) {
      const sel = document.createElement('select');
      const blank = document.createElement('option');
      blank.value = ''; blank.textContent = '--';
      sel.appendChild(blank);
      const normVal = val.trim();
      let matched = false;
      (TABLAS[f.tabla] || []).forEach(([code, label]) => {
        const opt = document.createElement('option');
        opt.value = code;
        opt.textContent = `${code} – ${label}`;
        if (!matched && (code === normVal || code === normVal.padStart(code.length, '0'))) {
          opt.selected = true;
          matched = true;
        }
        sel.appendChild(opt);
      });
      sel.dataset.origVal = val;
      sel.addEventListener('change', e => {
        const newVal = e.target.value;
        rows[ri][fi] = newVal;
        rawRows[ri][fi] = null;
        updateModified(ri, fi, e.target.closest('td'));
      });
      td.appendChild(sel);
    } else {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = val;
      // highlight matching text
      if (searchTerm && val.toLowerCase().includes(searchTerm.toLowerCase())) {
        inp.style.background = '#fff59d';
      }
      inp.addEventListener('input', e => { rows[ri][fi] = e.target.value; rawRows[ri][fi] = null; updateModified(ri, fi, e.target.closest('td')); });
      td.appendChild(inp);
    }
    tr.appendChild(td);
  });
  return tr;
}

function updateModified(ri, fi, tdEl) {
  const key = `${ri}:${fi}`;
  const isReverted = rows[ri][fi] === origRows[ri][fi];
  if (isReverted) {
    modifiedCells.delete(key);
    rawRows[ri][fi] = origRawRows[ri][fi];
    if (tdEl) tdEl.classList.remove('modified');
  } else {
    modifiedCells.add(key);
    if (tdEl) tdEl.classList.add('modified');
  }
  const info = document.getElementById('modifiedInfo');
  if (modifiedCells.size > 0) {
    info.style.display = '';
    info.textContent = `✏️ ${modifiedCells.size} celda${modifiedCells.size !== 1 ? 's' : ''} modificada${modifiedCells.size !== 1 ? 's' : ''}`;
  } else {
    info.style.display = 'none';
  }
}

// ─── CSV PARSING ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const display = [];
  const raw = [];
  for (const line of lines) {
    if (line.trim() === '') continue;
    const { displayCols, rawCols } = splitCSVLine(line, ';');
    while (displayCols.length < NUM_COLS) { displayCols.push(''); rawCols.push(''); }
    display.push(displayCols.slice(0, NUM_COLS));
    raw.push(rawCols.slice(0, NUM_COLS));
  }
  return { display, raw };
}

// Returns both the unquoted display value and the original raw token for each field
function splitCSVLine(line, sep) {
  const displayCols = [];
  const rawCols = [];
  let cur = '';      // unquoted display value
  let raw = '';      // original characters for this field
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      raw += ch;
      if (!inQ) {
        inQ = true;
      } else if (line[i+1] === '"') {
        cur += '"'; raw += '"'; i++;
      } else {
        inQ = false;
      }
    } else if (ch === sep && !inQ) {
      displayCols.push(cur);
      rawCols.push(raw);
      cur = ''; raw = '';
    } else {
      cur += ch;
      raw += ch;
    }
  }
  displayCols.push(cur);
  rawCols.push(raw);
  return { displayCols, rawCols };
}

// ─── CSV EXPORT ─────────────────────────────────────────────────────────────
function exportCSV() {
  if (rows.length === 0) { alert('No hay datos para exportar.'); return; }
  const lines = rows.map((row, ri) =>
    row.map((val, fi) => {
      const rr = rawRows[ri];
      if (rr && rr[fi] !== null && rr[fi] !== undefined) return rr[fi];
      // field was edited: re-serialize
      if (val.includes(';') || val.includes('"') || val.includes('\n')) {
        return '"' + val.replace(/"/g, '""') + '"';
      }
      return val;
    }).join(';')
  );
  const out = lines.join(originalLineEnding);
  const bytes = new Uint8Array(out.length);
  for (let i = 0; i < out.length; i++) bytes[i] = out.charCodeAt(i) & 0xFF;
  const blob = new Blob([bytes], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'previred_export.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ─── EVENT LISTENERS ────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    const text = evt.target.result;
    // detect original line ending
    if (text.includes('\r\n')) originalLineEnding = '\r\n';
    else if (text.includes('\r')) originalLineEnding = '\r';
    else originalLineEnding = '\n';
    const parsed = parseCSV(text);
    rows = parsed.display;
    rawRows = parsed.raw;
    origRows = parsed.display.map(r => [...r]);
    origRawRows = parsed.raw.map(r => [...r]);
    modifiedCells = new Set();
    document.getElementById('modifiedInfo').style.display = 'none';
    searchTerm = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('clearSearch').classList.remove('visible');
    document.getElementById('searchInfo').style.display = 'none';
    buildTable();
  };
  reader.readAsText(file, 'ISO-8859-1');
  e.target.value = '';
});

document.getElementById('btnExport').addEventListener('click', exportCSV);

// ─── SEARCH ──────────────────────────────────────────────────────────────────
let searchDebounce = null;
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  document.getElementById('clearSearch').classList.toggle('visible', searchTerm.length > 0);
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    if (rows.length > 0) applyFilter();
  }, 200);
});

document.getElementById('clearSearch').addEventListener('click', () => {
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearSearch').classList.remove('visible');
  if (rows.length > 0) applyFilter();
});

// ─── UNSAVED CHANGES WARNING ─────────────────────────────────────────────────
window.addEventListener('beforeunload', e => {
  if (modifiedCells.size > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// Initial render
buildTable();
